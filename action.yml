name: "Podcast Generator"
author: "Ray Villalobos (copied by maeam)"
description: "Generates a feed for a podcast from a YAML file"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: "The commiter's email address"
    required: True
    default: ${{ github.actor }}@localhost
  name:
    description: "The committer's mame"
    required: True
    default: ${{ github.actor }}
